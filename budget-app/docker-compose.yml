# Stack de PRODUCTION : données réelles dans le volume budget-db-data.
# La stack de dev (ports décalés, volume séparé) est dans docker-compose.dev.yml.
name: budget-app

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: budget-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Budget@pp2026!"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - budget-db-data:/var/opt/mssql
      - ./backups:/var/opt/mssql/backup

  # Sauvegarde quotidienne de BudgetDb dans ./backups (rétention 14 jours).
  # Le BACKUP est exécuté par le serveur SQL du service db, qui écrit le .bak
  # dans son propre mount /var/opt/mssql/backup ; ce conteneur ne fait qu'envoyer
  # l'ordre et purger les vieux fichiers. Seuls les backups automatiques
  # (BudgetDb_auto_*) sont purgés, jamais les backups manuels.
  db-backup:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: budget-db-backup
    depends_on:
      - db
    entrypoint: /bin/bash
    command:
      - -c
      - |
        sleep 30
        while true; do
          fichier="BudgetDb_auto_$$(date +%Y%m%d_%H%M%S).bak"
          if /opt/mssql-tools18/bin/sqlcmd -S db -U sa -P "Budget@pp2026!" -C \
               -Q "BACKUP DATABASE [BudgetDb] TO DISK = '/var/opt/mssql/backup/$$fichier' WITH INIT"; then
            echo "Backup OK : $$fichier"
            find /var/opt/mssql/backup -name 'BudgetDb_auto_*.bak' -mtime +14 -delete
            sleep 86400
          else
            echo "Backup échoué, nouvel essai dans 1 h"
            sleep 3600
          fi
        done
    volumes:
      - ./backups:/var/opt/mssql/backup
    restart: unless-stopped

  api:
    build: ./backend
    container_name: budget-api
    depends_on:
      - db
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ConnectionStrings__Default: "Server=db,1433;Database=BudgetDb;User Id=sa;Password=Budget@pp2026!;TrustServerCertificate=True;Encrypt=False"
    ports:
      - "5000:8080"
    restart: unless-stopped

  web:
    build: ./frontend
    container_name: budget-web
    depends_on:
      - api
    ports:
      - "4200:80"
    restart: unless-stopped

volumes:
  budget-db-data:
